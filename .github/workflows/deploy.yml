name: Deploy Next.js App to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Prepare deploy
        run: |
          mkdir -p deploy-dist
          cp -r .next package.json next.config.js public deploy-dist/
          echo "NODE_ENV=production" > deploy-dist/.env
          echo "PORT=3000" >> deploy-dist/.env
          echo "BUILD_DATE=$(date)" >> deploy-dist/.env
          echo "COMMIT_SHA=${{ github.sha }}" >> deploy-dist/.env

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: deploy-dist/*
          target: /var/www/wstudio_tech_usr/data/www/wstudio.tech
          overwrite: true
          strip_components: 1

      - name: Restart on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            export NVM_DIR="/home/wstudio_tech_usr/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /var/www/wstudio_tech_usr/data/www/wstudio.tech

            [ -d "deploy-dist" ] && mv deploy-dist/* ./ && rmdir deploy-dist

            npm install --production
            pm2 restart wstudio || pm2 start npm --name wstudio -- start -- --port 3000
            pm2 save