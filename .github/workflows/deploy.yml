name: Deploy Next.js App to VPS

on:
  push:
    branches: [ "master" ]  # или master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Restart app on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/fastuser/data/www/wstudio.tech

            echo "📦 Устанавливаем зависимости..."
            npm ci --omit=dev

            echo "🔄 Останавливаем wstudio в PM2..."
            pm2 delete wstudio || true

            echo "🔄 Ждём 3 секунды, чтобы PM2 освободил порт..."
            sleep 3

            echo "🔄 Убиваем ВСЕ процессы на порту 3000..."
            fuser -k 3000/tcp || true
            sleep 3

            echo "🔄 Дополнительно: убиваем по имени..."
            pkill -f "next start" || true
            pkill -f "next-server" || true
            sleep 2

            echo "🚀 Запускаем новое приложение через PM2..."
            pm2 start "npm run start" --name "wstudio"

            echo "✅ Деплой завершён."