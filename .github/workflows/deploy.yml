name: Deploy Next.js App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      # Подготавливаем минимальный дистрибутив для production
      - name: Prepare deploy directory
        run: |
          mkdir -p deploy-dist
          cp -r .next package.json next.config.js public deploy-dist/
          echo "NODE_ENV=production" > deploy-dist/.env
          echo "PORT=3000" >> deploy-dist/.env

      - name: Copy build files to VPS via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "deploy-dist/"
          target: "/var/www/wstudio_tech_usr/data/www/wstudio.tech"

      - name: Restart app on VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Переключаемся на wstudio_tech_usr и запускаем всё от его имени
            sudo -i -u wstudio_tech_usr bash << 'EOF'
            cd /var/www/wstudio_tech_usr/data/www/wstudio.tech

            # Перемещаем файлы из deploy-dist в корень (если нужно)
            if [ -d "deploy-dist" ]; then
              mv deploy-dist/* ./
              rmdir deploy-dist
            fi

            # Устанавливаем зависимости
            npm install --production

            # Останавливаем старый процесс
            pm2 stop wstudio || true

            # Запускаем приложение
            pm2 start npm --name "wstudio" -- start -- --port 3000

            # Сохраняем список процессов для автозапуска
            pm2 save
            EOF