name: Deploy Next.js App to VPS

on:
  push:
    branches:
      - main
  # Опционально: можно запускать вручную
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # ← Кэшируем node_modules

      - name: Install dependencies
        run: npm install

      - name: Run lint (optional)
        run: |
          if [ -f ".eslintrc.js" ]; then
            npm run lint -- --max-warnings=0
          fi
        continue-on-error: true

      - name: Build Next.js app
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy-dist
          cp -r .next package.json next.config.js public deploy-dist/
          echo "NODE_ENV=production" > deploy-dist/.env
          echo "PORT=3000" >> deploy-dist/.env
          echo "BUILD_DATE=$(date)" >> deploy-dist/.env
          echo "COMMIT_SHA=${{ github.sha }}" >> deploy-dist/.env
          echo "Built at: $(date)" > deploy-dist/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> deploy-dist/BUILD_INFO.txt

      - name: Copy build files to VPS via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "deploy-dist/"
          target: "/var/www/wstudio_tech_usr/data/www/wstudio.tech/deploy-temp"

      - name: Swap and restart on VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sudo -i -u wstudio_tech_usr bash << 'EOF'
            cd /var/www/wstudio_tech_usr/data/www/wstudio.tech

            # Останавливаем приложение до смены файлов
            pm2 stop wstudio || true

            # Удаляем старую временную папку, если есть
            rm -rf deploy-old
            # Переименовываем текущую в old (на случай отката)
            mv deploy-current deploy-old 2>/dev/null || true

            # Перемещаем новую версию в deploy-current
            mv deploy-temp deploy-current
            chown -R wstudio_tech_usr:wstudio_tech_usr deploy-current

            # Возвращаем нужные файлы обратно (симлинки или постоянные данные)
            # Например, если есть директория uploads
            # ln -sf ../shared/uploads deploy-current/public/uploads

            # Заходим в новую директорию
            cd deploy-current

            # Устанавливаем production зависимости
            npm install --production

            # Запускаем приложение из новой директории
            pm2 start npm --name "wstudio" -- start -- --port 3000

            # Сохраняем состояние PM2
            pm2 save

            # Удаляем старую версию через минуту (фоново)
            (sleep 60 && rm -rf deploy-old) &

            echo "✅ Deployment successful"
            EOF

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 Deploy succeeded%0ARepo: ${{ github.repository }}%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}"
        continue-on-error: true

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚨 Deploy FAILED%0ARepo: ${{ github.repository }}%0ACommit: ${{ github.sha }}%0AAction: ${{ github.workflow }}"
        continue-on-error: true